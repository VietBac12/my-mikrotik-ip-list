name: Update Mikrotik IP List

permissions:
  contents: write

on:
  schedule:
    - cron: '0 2 * * 1' # Tu dong chay 2h sang thu Hai
  workflow_dispatch:      # Cho phep chay thu cong bang tay

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        run: python generate_ip.py

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add vn_ipv4.rsc
          git commit -m "Auto Update VN IP list" || exit 0
          git push
