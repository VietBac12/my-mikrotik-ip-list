name: Update Mikrotik IP List

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write # Cần quyền này để xóa lịch sử Action

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run IP Generator
        run: python generate_ip.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add vn_ipv4.rsc
          git commit -m "🚀 Auto-update: $(date +'%Y-%m-%d %H:%M:%S')" || exit 0
          git push

      # --- ĐÂY LÀ TÍNH NĂNG DỌN DẸP BẠN ĐANG CẦN ---
      - name: Delete old workflow runs
        uses: Mattraiano/delete-old-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0       # Xóa ngay lập tức các bản cũ
          keep_minimum_runs: 3 # Chỉ giữ lại 3 bản chạy thành công gần nhất
