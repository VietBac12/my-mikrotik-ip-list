name: Update Mikrotik IP List
permissions:
  contents: write
  actions: write
on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Run script
        run: |
          pip install requests
          python generate_ip.py
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add vn_ipv4.rsc
          git commit -m "Refresh IP list" || exit 0
          git push
      - name: Cleanup old runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run list --workflow "Update Mikrotik IP List" --json databaseId -q ".[] | .databaseId" | tail -n +2 | xargs -r -I {} gh run delete {} || echo "Clean"
