name: Update Mikrotik IP List
permissions:
  contents: write  # Cấp quyền ghi vào kho lưu trữ
on:
  schedule:
    - cron: '0 2 * * 1' # Chạy vào 2 giờ sáng thứ Hai hàng tuần
  workflow_dispatch:      # Cho phép bạn nhấn nút chạy thủ công

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        run: python generate_ip.py

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add vn_ipv4.rsc
          git commit -m "Update VN IP list" || exit 0
          git push
