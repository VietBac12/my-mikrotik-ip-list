name: Update Mikrotik IP List

# 1. CHỐT CHẶN: Nếu có 2 lệnh cùng lúc, cái cũ sẽ bị "trảm" ngay lập tức
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    - cron: '0 2 * * 0' # Tự động chạy 2h sáng Chủ Nhật
  workflow_dispatch:      # Nút bấm thủ công

jobs:
  build:
    runs-on: ubuntu-latest
    
    # 2. CẤP QUYỀN: Cần quyền 'actions' để có thể xóa lịch sử chạy cũ
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run IP Generator
        run: python generate_ip.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add vn_ipv4.rsc
          git commit -m "🚀 Auto-update: $(date +'%Y-%m-%d %H:%M:%S')" || exit 0
          git push

      # 3. DỌN DẸP: Xóa sạch các bản chạy cũ, chỉ giữ lại 3 bản mới nhất
      - name: Delete old workflow runs
        uses: Mattraiano/delete-old-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 3
