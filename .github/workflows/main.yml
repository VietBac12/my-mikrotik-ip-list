name: Update Mikrotik IP List

permissions:
  contents: write
  actions: write    # THÊM QUYỀN NÀY để xóa được lịch sử chạy cũ

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        run: python generate_ip.py

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add vn_ipv4.rsc
          git commit -m "Auto Update VN IP list" || exit 0
          git push

      # BƯỚC "MA THUẬT": Xóa tất cả các lần chạy cũ, chỉ giữ lại lần này
      - name: Delete old workflow runs
        uses: Mattraiano/delete-old-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0      # Không giữ lại ngày nào cả
          keep_minimum_runs: 1 # Chỉ giữ lại 1 lần chạy duy nhất (là lần hiện tại)
