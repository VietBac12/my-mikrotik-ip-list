name: Update Mikrotik IP List

# Chống trùng lặp: Nếu có lượt chạy mới (#14), lượt cũ đang chờ (#13) sẽ bị hủy ngay lập tức
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    # Tự động chạy vào 02:00 sáng Chủ Nhật hàng tuần (Giờ UTC)
    - cron: '0 2 * * 0'
  workflow_dispatch: # Cho phép bạn nhấn nút "Run workflow" bằng tay

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Cấp quyền để Action có thể ghi (push) file vào Repository của bạn
    permissions:
      contents: write

    steps:
      # 1. Lấy mã nguồn từ Repository về máy ảo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Cài đặt môi trường Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Cài đặt thư viện cần thiết (requests)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # 4. Chạy script Python để tạo file vn_ipv4.rsc
      - name: Run IP Generator
        run: python generate_ip.py

      # 5. Đẩy file mới lên GitHub (Tự động commit với tên bạn)
      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add vn_ipv4.rsc
          # Chỉ commit nếu file có sự thay đổi
          git commit -m "🚀 Auto-update VN IP List: $(date +'%Y-%m-%d %H:%M:%S')" || exit 0
          git push
